<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Arbitrage Detection System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #1f77b4;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 15px;
            color: white;
            text-align: center;
        }
        
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .metric-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
        }
        
        .chart-container h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #667eea;
            color: white;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .risk-HIGH {
            background: #ffcccc;
        }
        
        .risk-MEDIUM {
            background: #fff3cd;
        }
        
        .risk-LOW {
            background: #d4edda;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: #666;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: red;
        }
        
        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 AI-Powered Arbitrage Detection System</h1>
        
        <div id="loading" class="loading">Loading arbitrage opportunities...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="content" style="display: none;">
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
            
            <div class="metrics">
                <div class="metric-card">
                    <div class="metric-label">Total Opportunities</div>
                    <div class="metric-value" id="total-opp">0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Avg Arbitrage</div>
                    <div class="metric-value" id="avg-arb">0%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Max Arbitrage</div>
                    <div class="metric-value" id="max-arb">0%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Total Profit</div>
                    <div class="metric-value" id="total-profit">$0</div>
                </div>
            </div>
            
            <div class="charts">
                <div class="chart-container">
                    <h3>📈 Arbitrage by Market</h3>
                    <canvas id="barChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>💰 Profit Distribution</h3>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
            
            <h3>📋 Detailed Opportunities</h3>
            <table id="opportunities-table">
                <thead>
                    <tr>
                        <th>Market</th>
                        <th>Arbitrage</th>
                        <th>ROI</th>
                        <th>Risk</th>
                        <th>Platform 1</th>
                        <th>Platform 2</th>
                        <th>Profit</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        let barChart, pieChart;
        
        async function loadData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const content = document.getElementById('content');
            
            loading.style.display = 'block';
            error.style.display = 'none';
            content.style.display = 'none';
            
            try {
                const response = await fetch('/api/opportunities');
                const result = await response.json();
                
                if (result.status === 'success') {
                    displayData(result);
                    loading.style.display = 'none';
                    content.style.display = 'block';
                } else {
                    throw new Error('Failed to load data');
                }
            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = 'Error loading data: ' + err.message;
            }
        }
        
        function displayData(result) {
            const data = result.data;
            const metrics = result.metrics;
            
            // Update metrics
            document.getElementById('total-opp').textContent = metrics.total_opportunities;
            document.getElementById('avg-arb').textContent = metrics.avg_arbitrage.toFixed(2) + '%';
            document.getElementById('max-arb').textContent = metrics.max_arbitrage.toFixed(2) + '%';
            document.getElementById('total-profit').textContent = '$' + metrics.total_profit.toFixed(2);
            
            // Update table
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            data.market.forEach((market, i) => {
                const row = document.createElement('tr');
                row.className = 'risk-' + data.risk_level[i];
                row.innerHTML = `
                    <td>${market}</td>
                    <td>${data.arbitrage[i].toFixed(2)}%</td>
                    <td>${data.roi[i].toFixed(2)}%</td>
                    <td>${data.risk_level[i]}</td>
                    <td>${data.platform1[i]}</td>
                    <td>${data.platform2[i]}</td>
                    <td>$${data.profit[i].toFixed(2)}</td>
                `;
                tbody.appendChild(row);
            });
            
            // Update charts
            updateCharts(data);
        }
        
        function updateCharts(data) {
            // Bar Chart
            const barCtx = document.getElementById('barChart').getContext('2d');
            
            if (barChart) {
                barChart.destroy();
            }
            
            barChart = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: data.market,
                    datasets: [{
                        label: 'Arbitrage %',
                        data: data.arbitrage,
                        backgroundColor: data.risk_level.map(risk => 
                            risk === 'HIGH' ? 'rgba(255, 99, 132, 0.8)' :
                            risk === 'MEDIUM' ? 'rgba(255, 206, 86, 0.8)' :
                            'rgba(75, 192, 192, 0.8)'
                        )
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
            
            // Pie Chart
            const pieCtx = document.getElementById('pieChart').getContext('2d');
            
            if (pieChart) {
                pieChart.destroy();
            }
            
            pieChart = new Chart(pieCtx, {
                type: 'pie',
                data: {
                    labels: data.market,
                    datasets: [{
                        data: data.profit,
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.8)',
                            'rgba(54, 162, 235, 0.8)',
                            'rgba(255, 206, 86, 0.8)',
                            'rgba(75, 192, 192, 0.8)',
                            'rgba(153, 102, 255, 0.8)'
                        ]
                    }]
                },
                options: {
                    responsive: true
                }
            });
        }
        
        // Load data on page load
        loadData();
    </script>
</body>
</html>
